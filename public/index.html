<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div id="lobby-screen">
        <div class="lobby-panel">
            <h1>TANK WARFARE</h1>
            <button id="btn-create-lobby" class="action-btn">Create New Match</button>

            <div class="lobby-divider">OR JOIN EXISTING</div>

            <div id="lobby-list">
                <!-- Active lobbies will be injected here via JS -->
                <div style="text-align:center; color:#777;">Searching for matches...</div>
            </div>
        </div>
    </div>

    <!-- The Virtual Game World -->
    <div id="game-arena">
        <!-- Player and Bullet DIVs will be injected here by JS -->
    </div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <div id="timer">3:00</div>
        <div id="scoreboard">Waiting for players...</div>
    </div>

    <div id="player-hud">
        <div class="hud-bar-bg" id="hp-container">
            <div id="hp-bar"></div>
        </div>
        <div class="hud-bar-bg" id="reload-container">
            <div id="reload-bar"></div>
        </div>
    </div>
    <div id="kill-feed"></div>
    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Press Enter to chat..." autocomplete="off" maxlength="100">
    </div>
    <!-- Event Log for announcements -->
    <div id="event-log"></div>

    <!-- The Pause Menu -->
    <div id="menu-overlay" style="display: none;">
        <div class="menu-box">
            <h2>GAME PAUSED</h2>
            <button id="btn-resume">Resume Game</button>
            <button id="btn-quit">Quit Game</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared/constants.js"></script>
    <script src="/js/state.js"></script>
    <script src="/js/audio.js"></script>
    <script src="/js/input.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/render.js"></script>
    <script src="/js/main.js"></script>
</body>

</html>
